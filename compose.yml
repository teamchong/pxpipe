services:
  pxpipe:
    build:
      context: .
    restart: unless-stopped
    init: true
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:${PXPIPE_PORT:-47821}:47821"
    environment:
      - PXPIPE_MODELS
      - PXPIPE_DISABLE
      - PXPIPE_UPSTREAM
      - ANTHROPIC_UPSTREAM
      - OPENAI_UPSTREAM
      - OPENAI_API_KEY
      - OPENAI_MODELS
      - CLOUDFLARE_MODELS
      - CLOUDFLARE_ACCOUNT_ID
      - CLOUDFLARE_API_TOKEN
      - PXPIPE_PROVIDER
      - PXPIPE_GATEWAY_BASE_URL
      - PXPIPE_GATEWAY_HEADERS
      - PXPIPE_GPT_PROFILES
      - PXPIPE_DUMP_DIR
      - PXPIPE_DEBUG_CAPTURE_4XX
    volumes:
      - pxpipe-data:/data

volumes:
  pxpipe-data:
